# Configuração do Supabase CLI para o projeto Lúa & Lis.
# Documentação: https://supabase.com/docs/guides/cli/config
#
# Para vincular este repo ao seu projeto Supabase hospedado:
#   npx supabase login
#   npx supabase link --project-ref <SEU_PROJECT_REF>
#
# O project_ref aparece em Settings → General → Reference ID do dashboard.

project_id = "lacos-premium"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[storage]
enabled = true
# Limite por arquivo (deve bater com o limite do bucket no dashboard)
file_size_limit = "5MiB"

[storage.buckets.lacos]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif", "image/svg+xml"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[inbucket]
enabled = true
port = 54324
